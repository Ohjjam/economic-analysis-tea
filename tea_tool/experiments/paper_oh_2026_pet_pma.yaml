# Paper: Oh, Lee, Lee et al., Green Chemistry 2026, 28, 3573.
# "Mild hydrolysis of PET and electrochemical energy recovery via
#  multifunctional polyoxometalate catalysts" (UNIST; doi:10.1039/d5gc04677g)
# This is the source paper for the project's PET TEA template.
#
# SCHEMA v2 EXEMPLAR — every price/assumption carries a `*_ref` citation id,
# and the `pfd:` block fully specifies the process flow diagram (units with
# operating conditions, streams classed feed/intermediate/recycle/product,
# and the initial-vs-makeup charge distinction). Validate with:
#     python -m tea_engine.validate_cli experiments/paper_oh_2026_pet_pma.yaml
schema_version: 2

meta:
  name: "Oh 2026 — Mild PET hydrolysis (PMA + EC)"
  slug: "paper_oh_2026_pet_pma"
  date: 2026-01-05
  researcher: "Oh, Lee, Lee et al. (Green Chem.)"
  lab: "UNIST Energy & Chemical Engineering"
  notes: |
    User's own paper. Multifunctional PMA catalyst hydrolyzes PET at
    100 °C / 1 M H2SO4 in H2O — TPA precipitates, EG dissolves and
    is subsequently oxidized to glycolic acid (GA) and formic acid (FA),
    storing 8.34 mmol of electrons in PMA(red). The stored electrons
    are then used either to drive low-energy H2 production
    (125 mA cm-2 at 1.2 V) or generate electricity (12.5 mW cm-2 at 0.05 V).
    Reported baseline MSP = $0.81/kg TPA (95 % DMSO recovery → $0.87/kg).

# ============================================================================
# References — first-class citation registry (schema v2).
# Every sourced number elsewhere in this file points here via a *_ref id.
# ============================================================================
references:
  - id: oh2026
    citation: "Oh, Lee, Lee et al., Green Chem. 2026, 28, 3573 (this paper)"
    type: literature
    doi: "10.1039/d5gc04677g"
  - id: recycling_market_2024
    citation: "Post-consumer / waste PET recycling market price, 2024"
    type: market
    note: "Waste PET feedstock low-end basis."
  - id: icis2024
    citation: "ICIS Chemical Business — PET contract price, 2024"
    type: market
  - id: made_in_china
    citation: "Made-in-China.com industrial bulk quotes (PMA, H2SO4), 2024"
    type: vendor
  - id: echemi
    citation: "Echemi market price — DMSO, 2024"
    type: market
  - id: natcomm2021
    citation: "Na, Seh et al., Nat. Commun. 12, 4679 (2021)"
    type: literature
    doi: "10.1038/s41467-021-25214-1"
    note: "Electrolyzer $/m^2, capacity factor, H2O price, M+O fractions."
  - id: kepco2024
    citation: "KEPCO industrial electricity tariff, 2024"
    type: market
  - id: turton2018
    citation: "Turton et al., Analysis, Synthesis & Design of Chemical Processes, 5th ed. (2018)"
    type: literature
    note: "Medium-pressure steam $4.77/GJ."
  - id: iecr2021
    citation: "Ind. Eng. Chem. Res. 2021, 60, 5588–5599"
    type: literature
    note: "Formic-acid distillation CAPEX/OPEX correlation."
  - id: joule2021
    citation: "Joule 5, 2479–2503 (2021)"
    type: literature
    note: "Discount rate 10%, 30-year plant life."

chemistry:
  reaction_type: "hybrid"
  description: |
    Two-stage hybrid: (1) acid hydrolysis of PET in PMA / H2SO4 / DMSO
    co-solvent system → TPA(s) + EG(aq); (2) PMA-mediated oxidation of
    EG → glycolic acid → formic acid with electron storage in
    PMA(red); (3) electrochemical recovery: PMA(red) re-oxidation at
    the anode coupled to HER at the cathode (or fuel-cell mode).
  reactions:
    - lhs: "PET + 2 H2O"
      rhs: "TPA + EG"
      role: "hydrolysis"
    - lhs: "EG + PMA(ox)"
      rhs: "GA + FA + PMA(red)"
      role: "EG oxidation"
    - lhs: "PMA(red) -> PMA(ox)"
      rhs: "anode"
      role: "regeneration"
    - lhs: "2 H+ + 2 e-"
      rhs: "H2"
      role: "cathode"
  target_products:
    - "TPA"
    - "FA"
    - "H2"
    - "Glycolic acid"

feedstock:
  primary:
    name: "PET"
    mass_per_batch_g: 1.0
    purity_pct: 95
    price_usd_per_kg: 0.10
    price_ref: recycling_market_2024
    source_note: "Waste/post-consumer PET, recycling market 2024"
  reagents:
    - name: "PMA"
      mass_per_batch_g: 0.166
      recovery_fraction: 0.99
      role: "catalyst"
      price_usd_per_kg: 0.01
      price_ref: made_in_china
    - name: "H2SO4"
      mass_per_batch_g: 0.245
      recovery_fraction: 0.99
      role: "solvent"
      price_usd_per_kg: 0.037
      price_ref: made_in_china
    - name: "DMSO"
      mass_per_batch_g: 5.0
      recovery_fraction: 0.99            # via 180 °C distillation
      role: "solvent"
      price_usd_per_kg: 1.50
      price_ref: echemi
    - name: "H2O"
      mass_per_batch_g: 2.5
      recovery_fraction: 0.9
      role: "utility"
      price_usd_per_kg: 0.00022
      price_ref: natcomm2021

operating_conditions:
  temperature_C: 100
  pressure_bar: 1
  ph: 0.5
  reaction_time_h: 2.0
  batch_volume_ml: 10
  electrochem:
    cell_voltage_V: 1.2
    current_density_mA_cm2: 125
    faradaic_efficiency_pct: 95
    electrode_area_cm2: 1.0
    electrolyte: "1 M H2SO4 + DMSO + PMA(red)"
    membrane: "Nafion"

results:
  yields:
    - product: "TPA"
      yield_pct: 94.0       # ~0.94 g TPA / g PET (mass)
      selectivity_pct: 98
    - product: "FA"
      yield_pct: 8.0
      selectivity_pct: 85
    - product: "Glycolic acid"
      yield_pct: 12.0
      selectivity_pct: 80
    - product: "H2"
      yield_pct: 0.8
  conversion_pct: 90
  mass_balance_closure_pct: 98
  notes: "90% PET conversion in 2 h; 1.30 mmol TPA, 1.26 mmol EG per batch (gravimetric)."

downstream:
  - step: "TPA filtration"
    method: "Solid-liquid filtration (acid precipitation)"
    recovery_pct: 98
    target_purity_pct: 99
  - step: "DMSO distillation"
    method: "Distillation (180 °C reboiler)"
    solvent_loading_kg_per_kg_feed: 5.0
    recovery_pct: 99
    target_purity_pct: 99
  - step: "FA polishing"
    method: "Distillation"
    recovery_pct: 90
    target_purity_pct: 95
  - step: "PMA regeneration (EC)"
    method: "Electrochemical reoxidation + H2 production"
    recovery_pct: 99

