# Standalone modeling assumptions (schema v2) — each sourced.
# ============================================================================
assumptions:
  - key: "electrolyzer_cost_usd_per_m2"
    value: 10000
    unit: "$/m^2"
    ref: natcomm2021
  - key: "electricity_price_usd_per_kWh"
