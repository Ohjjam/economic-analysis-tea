    unit: "mA/cm^2"
    ref: oh2026

# ============================================================================
# Process flow diagram (schema v2) — units carry operating conditions, streams
# are classed, and initial vs makeup charges are made explicit.
# ============================================================================
pfd:
  units:
    - key: feed
      label: "Feedstock Pretreatment"
      kind: "Pretreatment"
      conditions: {T_C: 25, P_bar: 1, note: "shred / mill PET flake"}
    - key: rxn
      label: "Hydrothermal Reactor"
      kind: "Thermal Reactor"
      conditions: {T_C: 100, P_bar: 1, residence_h: 2.0,
                   note: "hydrothermal hydrolysis: PET+H2O->TPA(s)+EG; EG oxidised by PMA(ox)->GA/FA, e- stored in PMA(red)"}
    - key: filt
      label: "TPA Filtration"
      kind: "Filter / Centrifuge"
      conditions: {T_C: 25, P_bar: 1, note: "solid/liquid split: TPA precipitates out; EG/FA/GA + PMA(red) stay in liquor"}
    - key: ec
      label: "Electrochemical PMA Regeneration + H2"
      kind: "Electrochemical Cell"
      conditions: {V_cell: 1.2, j_mA_cm2: 125, FE_pct: 95, T_C: 25,
                   note: "anode: PMA(red)->PMA(ox) regenerated; cathode: HER -> H2. Residual EG/FA/GA can be further oxidised here."}
    - key: dmso_dist
      label: "DMSO Distillation"
      kind: "Distillation Column"
      conditions: {T_C: 180, P_bar: 1, note: "reboiler; recovers ~99% DMSO solvent for recycle"}
    - key: org_recovery
      label: "Organics Recovery (distillation)"
      kind: "Distillation Column"
      conditions: {T_C: 100, P_bar: 1, note: "OPTIONAL (scenario B): multi-stage distillation to recover FA + glycolic acid as products"}
  streams:
    - {from: "in:PET",   to: feed,        label: "waste PET",            kind: feed}
    - {from: feed,       to: rxn,         label: "shredded PET",         kind: intermediate}
    - {from: "in:H2O",   to: rxn,         label: "hydrothermal water",   kind: feed}
    - {from: "in:PMA",   to: rxn,         label: "PMA catalyst",         kind: feed}
    - {from: "in:H2SO4", to: rxn,         label: "H2SO4",                kind: feed}
    - {from: "in:DMSO",  to: rxn,         label: "DMSO co-solvent",      kind: feed}
    - {from: rxn,        to: filt,        label: "TPA slurry + liquor",  kind: intermediate}
    - {from: filt,       to: "out:TPA",   label: "battery-grade TPA",    kind: product}
    - {from: filt,       to: ec,          label: "liquor: EG/FA/GA + PMA(red)", kind: intermediate}
    - {from: ec,         to: "out:H2",    label: "H2 (cathode)",         kind: product}
    - {from: ec,         to: rxn,         label: "regenerated PMA(ox)",  kind: recycle}
    - {from: ec,         to: dmso_dist,   label: "spent liquor",         kind: intermediate}
    - {from: dmso_dist,  to: rxn,         label: "recovered DMSO",       kind: recycle}
    - {from: dmso_dist,  to: org_recovery,label: "FA/GA-rich bottoms",   kind: intermediate}
    - {from: org_recovery, to: "out:FA",  label: "formic acid",          kind: product}
    - {from: org_recovery, to: "out:GA",  label: "glycolic acid",        kind: product}
  charges:
    # initial vs makeup distinction (engineering correctness)
    - {stream: "PMA",   kind: initial,    note: "one-time catalyst inventory; regenerated electrochemically, makeup only for losses"}
    - {stream: "DMSO",  kind: makeup,     note: "~99% recovered by distillation; only the loss is purchased"}
    - {stream: "H2SO4", kind: makeup,     note: "recycled; makeup for losses"}
    - {stream: "PET",   kind: continuous, note: "continuous feed, purchased per batch"}
    - {stream: "H2O",   kind: makeup,     note: "hydrothermal medium; largely recycled, makeup for losses"}

constraints:
  preferred_msp_product: "TPA"
  hazardous_materials: ["h2so4", "h2"]
  scale_up_priority: "balanced"
  plant_lifetime_years: 30
  discount_rate: 0.10
  must_have_unit_operations: ["distillation", "electrolysis", "filtration"]

scale_targets:
  scales_ton_per_batch: [0.01, 0.1, 1.0, 5.0, 10.0]
  capacity_factor: 0.85
  batch_hours: 2.0

# Numbers reported in the paper for cross-validation (auto-builder vs paper).
reported:
  msp_usd_per_kg: 0.81           # baseline TPA MSP
  msp_at_95pct_dmso_recovery: 0.87
  total_revenue_M_usd_per_y: 53.6
  source: "Oh et al., Green Chem. 2026, 28, 3573"

# ============================================================================
# Product-strategy scenarios (schema v2, optional) — drives the generic
# scenario engine (tea_engine/scenarios.py). Should we recover & sell each
# co-product (EG/GA/FA), or is its separation cost > its sale value?
# Amounts marked [stoich/est] are first-cut; replace with the measured stream
# table. base_opex_excludes removes the FA-distillation OPEX that build_pet
# bakes into the base so the FA increment isn't double-counted.
# ============================================================================
scenarios:
  basis_scale_ton: 10.0
  primary_product: "TPA"
  base_coproducts: ["H2"]
  base_opex_excludes_usd_per_ton: 1225309.96   # FA-distillation OPEX in build_pet
  variable_coproducts:
    - key: "EG"
      name: "Ethylene glycol"
      kg_per_kg_feed: 0.20
      amount_basis: "[stoich/est] ~0.20 g/g PET (PET->TPA+EG, partial EG before oxidation)"
      price_usd_kg: 0.60
      price_ref: echemi
      sep_capex_usd_per_kg: 0.0884
      sep_opex_usd_per_kg: 0.8633
      sep_difficulty: 1.3
      sep_ref: iecr2021
      feasibility: "Feasible but energy-heavy: EG bp 197 C, fully water-miscible -> high reboiler duty."
    - key: "GA"
      name: "Glycolic acid"
      kg_per_kg_feed: 0.12
      amount_basis: "[paper yield] 12% w/w on PET"
      price_usd_kg: 1.50
      price_ref: echemi
      sep_capex_usd_per_kg: 0.0884
      sep_opex_usd_per_kg: 0.8633
      sep_difficulty: 1.6
      sep_ref: iecr2021
      feasibility: "Hard: GA decomposes near bp -> recovered by evaporation/crystallisation; costed as a distillation proxy x1.6."
    - key: "FA"
      name: "Formic acid"
      kg_per_kg_feed: 0.08
      amount_basis: "[paper yield] 8% w/w on PET (validated build_pet output)"
      price_usd_kg: 0.84
      price_ref: oh2026
      sep_capex_usd_per_kg: 0.0884
      sep_opex_usd_per_kg: 0.8633
      sep_difficulty: 1.0
      sep_ref: iecr2021
      feasibility: "Feasible: FA bp 100.8 C but forms a water azeotrope (~78 wt%); IECR-2021 route handles it."
