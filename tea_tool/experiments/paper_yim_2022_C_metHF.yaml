# Option C: replace chloroform with 2-MeTHF green solvent.
#   - 2-MeTHF price ≈ $8/kg (specialty bulk, 2024)
#   - density ≈ 0.85 g/mL — slightly worse phase separation but feasible
#   - much better safety profile (non-carcinogenic, bio-derived)
#   - higher recovery achievable (∼99%) due to lower boiling point (80°C)
meta:
  name: "Yim/Oh 2022 — Option C (2-MeTHF instead of CHCl3)"
  slug: "paper_yim_2022_C_metHF"
  date: 2026-05-27
  researcher: "auto-variant of paper_yim_2022_modular_flow_lignin"
  lab: "POSTECH + UNIST"
  notes: "Swap chloroform extraction solvent for 2-methyl-THF (bio-based
          green solvent). H2 is MSP target as in option A."

chemistry:
  reaction_type: "hybrid"
  description: "Two-stage: thermal PMA-mediated lignin depolymerization,
                then electrochemical PMA reactivation + HER."
  stages:
    - name: "FRP (thermal depolymerization)"
      type: "thermal"
      T_C: 80
      P_bar: 35
      residence_h: 0.53        # 32 min
      heating_method: "heat-exchanger jacketed FRP plates"
      description: "Lignin + PMA(ox) → aromatic monomers + PMA(red).
                    No electricity here, just heat duty."
    - name: "EC cell (PMA reactivation + HER)"
      type: "electrochemical"
      T_C: 25
      P_bar: 1
      V: 1.5
      j_mA_cm2: 20.5
      FE_pct: 100
      description: "PMA(red) → PMA(ox) at anode; 2 H+ + 2 e- → H2 at cathode.
                    No OER → no O2 evolution. Reactivated PMA recycles to FRP."
  target_products:
    - "H2"
    - "Vanillin"
    - "Acetovanillone"

feedstock:
  primary:
    name: "Organosolv Lignin"
    mass_per_batch_g: 1.10
    purity_pct: 95
    price_usd_per_kg: 0.40
    source_note: "Kraft lignin"
  reagents:
    - name: "PMA"
      mass_per_batch_g: 11.0
      recovery_fraction: 0.99
      role: "catalyst"
      price_usd_per_kg: 0.01
    - name: "H2SO4"
      mass_per_batch_g: 1.18
      recovery_fraction: 0.97
      role: "solvent"
      price_usd_per_kg: 0.037
    - name: "H2O"
      mass_per_batch_g: 12.0
      recovery_fraction: 0.95
      role: "utility"
      price_usd_per_kg: 0.00022
    - name: "2-MeTHF"
      mass_per_batch_g: 6.0
      recovery_fraction: 0.99      # higher recovery than chloroform
      role: "solvent"
      price_usd_per_kg: 8.0         # higher price than chloroform

operating_conditions:
  temperature_C: 80
  pressure_bar: 35
  ph: 0.5
  reaction_time_h: 0.53
  electrochem:
    cell_voltage_V: 1.5
    current_density_mA_cm2: 20.5
    faradaic_efficiency_pct: 100
    electrode_area_cm2: 1.0
    electrolyte: "1 M H2SO4 + PMA"
    membrane: "Nafion"

results:
  yields:
    - product: "H2"
      yield_pct: 0.20
      selectivity_pct: 100
    - product: "Vanillin"
      yield_pct: 0.05
      selectivity_pct: 65
    - product: "Acetovanillone"
      yield_pct: 0.017
      selectivity_pct: 22

downstream:
  - step: "2-MeTHF extraction"
    method: "In-line liquid-liquid extraction"
    solvent: "2-MeTHF"
    solvent_loading_kg_per_kg_feed: 5.0
    recovery_pct: 99
  - step: "Density-based phase separation"
    method: "Phase separation"
    recovery_pct: 95
  - step: "2-MeTHF recovery"
    method: "Distillation"
    recovery_pct: 99
  - step: "Vanillin crystallisation"
    method: "Cooling crystallization"
    recovery_pct: 80
    target_purity_pct: 98
  - step: "Electrolyzer (PMA reactivation + HER)"
    method: "Flow electrolyzer (Nafion-based PEM)"
    recovery_pct: 100

constraints:
  preferred_msp_product: "H2"
  hazardous_materials: ["h2so4", "h2"]   # 2-MeTHF replaces chloroform hazard
  scale_up_priority: "balanced"
  plant_lifetime_years: 20
  discount_rate: 0.10

scale_targets:
  scales_ton_per_batch: [0.001, 0.01, 0.1, 1.0, 10.0]
  capacity_factor: 0.90
  batch_hours: 0.53

reported:
  msp_usd_per_kg: null
  source: "Variant — chloroform → 2-MeTHF (Sigma 2024 ≈ $8/kg)"
