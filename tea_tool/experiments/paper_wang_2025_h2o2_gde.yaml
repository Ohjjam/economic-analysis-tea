# Paper: Wang, Sang, Liu, Li, Li, Nie, Liang et al.,
# Advanced Functional Materials 35, 2502458 (2025).
# "Industrial-Level H2O2 Electrosynthesis via Defect-Induced Strain in
#  Laser-Fabricated Nickel-Carbon Catalysts and Gas-Diffusion Electrodes"
meta:
  name: "Wang 2025 — Laser Ni-C GDE for industrial H2O2"
  slug: "paper_wang_2025_h2o2_gde"
  date: 2025-04-25
  researcher: "Wang, Sang, Liang et al. (Adv Funct Mater)"
  lab: "(paper reproduction)"
  notes: |
    Defect-rich ultrafine Ni nanoparticles fabricated by UV-laser
    treatment, deposited as free-standing GDE. Operates at
    industrial-relevant ampere-scale current densities with high
    FE and 500+ h durability.

chemistry:
  reaction_type: "electrochemical"
  description: |
    GDE-based 2e- ORR on laser-fabricated Ni-C catalyst.
    OER counter electrode.
  reactions:
    - lhs: "O2 + H2O + 2 e-"
      rhs: "HO2- + OH-"
      role: "cathode"
    - lhs: "4 OH-"
      rhs: "O2 + 2 H2O + 4 e-"
      role: "anode"
  target_products:
    - "H2O2"

feedstock:
  primary:
    name: "O2"
    mass_per_batch_g: 120.0
    price_usd_per_kg: 0.032
    source_note: "Air-separation O2; GDE-fed gas"
  reagents:
    - name: "KOH"
      mass_per_batch_g: 5.6
      recovery_fraction: 0.99
      role: "solvent"
      price_usd_per_kg: 0.57
    - name: "H2O"
      mass_per_batch_g: 150.0
      recovery_fraction: 0.99
      role: "utility"
      price_usd_per_kg: 0.00022

operating_conditions:
  temperature_C: 25
  pressure_bar: 1
  ph: 13
  reaction_time_h: 1.0
  electrochem:
    cell_voltage_V: 1.75
    current_density_mA_cm2: 600
    faradaic_efficiency_pct: 94
    electrode_area_cm2: 1.0
    electrolyte: "1 M KOH"
    membrane: "AEM"

results:
  yields:
    - product: "H2O2"
      yield_pct: 4.5
      selectivity_pct: 94

downstream:
  - step: "H2O2 polishing"
    method: "Membrane separation"
    recovery_pct: 95
    target_purity_pct: 30

constraints:
  preferred_msp_product: "H2O2"
  hazardous_materials: ["h2o2", "koh"]
  scale_up_priority: "balanced"
  plant_lifetime_years: 20
  discount_rate: 0.08

scale_targets:
  scales_ton_per_batch: [0.001, 0.01, 0.1, 1.0, 10.0]
  capacity_factor: 0.96
  batch_hours: 1.0

reported:
  msp_usd_per_kg: 0.85
  source: "Wang et al., Adv Funct Mater 35, 2502458 (2025); industrial-scale TEA"
