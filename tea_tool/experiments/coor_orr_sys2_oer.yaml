# System #2 — Conventional OER + 2e-ORR baseline, 1.5 V steady (no pulse).
# Source: Article/260506 COOR-ORR TEA.xlsx, sheet "system 2".
meta:
  name: "OER-ORR baseline (1.5V continuous)"
  slug: "coor_orr_sys2_oer"
  date: 2026-05-06
  researcher: "TEA workbook"
  lab: "UNIST"
  notes: |
    Baseline against system #1. Pure water electrolysis on the anode
    (OER) coupled to 2e-ORR on the cathode at 1.5 V. No CO/LDG feed,
    no carbonate byproduct.

chemistry:
  reaction_type: "electrochemical"
  description: |
    Conventional OER + 2e-ORR. Anode oxidizes water to O2; cathode
    reduces O2 to H2O2. Standard alkaline cell.
  reactions:
    - lhs: "4 OH-"
      rhs: "O2 + 2 H2O + 4 e-"
      role: "anode"
    - lhs: "O2 + H2O + 2 e-"
      rhs: "HO2- + OH-"
      role: "cathode"
  target_products:
    - "H2O2"

feedstock:
  primary:
    name: "O2"
    mass_per_batch_g: 42.9        # 500 mL/min * 1.429 * 60 min * 1 hr / 1000 (2 hr batch on-time)
    price_usd_per_kg: 0.032
    source_note: "Air-separation O2"
  reagents:
    - name: "KOH"
      mass_per_batch_g: 5.6
      recovery_fraction: 0.99
      role: "solvent"
      price_usd_per_kg: 0.57
    - name: "H2O"
      mass_per_batch_g: 100.0
      recovery_fraction: 0.99
      role: "utility"
      price_usd_per_kg: 0.00022

operating_conditions:
  temperature_C: 25
  pressure_bar: 1
  ph: 14
  reaction_time_h: 2.0
  batch_volume_ml: 100
  electrochem:
    cell_voltage_V: 1.5
    current_density_mA_cm2: 113   # 816.5 C / (2 h * 3600 s) / 1 cm² ≈ 113
    faradaic_efficiency_pct: 87.09
    electrode_area_cm2: 1.0
    electrolyte: "1 M KOH"
    membrane: "Nafion 117"

results:
  yields:
    - product: "H2O2"
      yield_pct: 0.29             # 0.125 g per 42.9 g O2 fed (limited by FE)
      selectivity_pct: 87.09

downstream:
  - step: "H2O2 polishing"
    method: "Distillation"
    recovery_pct: 90
    target_purity_pct: 30

constraints:
  preferred_msp_product: "H2O2"
  hazardous_materials: []
  scale_up_priority: "opex"
  plant_lifetime_years: 30
  discount_rate: 0.07

scale_targets:
  scales_ton_per_batch: [0.001, 0.01, 0.1, 1.0, 10.0]
  capacity_factor: 0.959
  batch_hours: 2.0
