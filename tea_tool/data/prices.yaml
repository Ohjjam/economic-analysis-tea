# Component price database for the TEA tool
#
# Each entry: $/kg unless noted.  `source` documents WHERE the number came
# from.  `lookup` URLs point to a public search page so the user can verify
# / refresh manually (commercial price feeds like ICIS / S&P Global are
# paywalled — we link to public proxies: ECHEMI, Made-in-China, Alibaba,
# Trading Economics, EIA).
#
# Tag conventions:
#   role: input | output | utility | catalyst | solvent | electrolyte
#   tier: paper | market | estimate
#
# When the user clicks "Refresh price" in the UI, the app opens the lookup
# URL(s) in a browser tab — actual web scraping of these sites is deliberately
# avoided because they have aggressive anti-bot measures.  The user pastes the
# new $/kg and saves.

